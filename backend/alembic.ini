# Alembic configuration.
# NOTE: keep this file ASCII-only. On Windows Alembic reads it with the
# system locale codec (cp1252), so non-ASCII characters would break startup.
# The database URL is NOT set here; it comes from settings.DATABASE_URL (.env)
# inside alembic/env.py to keep a single source of truth.

[alembic]
script_location = alembic
prepend_sys_path = .
# Revision filename format: date_slug for convenient sorting.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
